<section class="contact-section">

    <h1>Contact Us</h1>

    <form id="contactForm">

        <input
        type="text"
        id="name"
        placeholder="Enter Your Name"
        >

        <input
        type="email"
        id="email"
        placeholder="Enter Your Email"
        >

        <textarea
        id="message"
        placeholder="Enter Your Message"
        ></textarea>

        <button type="submit">
            Send Message
        </button>

    </form>

</section>

<script src="script.js"></script>

</body>
