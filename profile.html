    <section class="profile">

        <h1>My Profile</h1>

        <div class="profile-card">

           <img src="images/vandana.png.png" id="profileImage" alt="Profile Photo">

            <br><br>

            <input type="file" id="imageUpload" accept="image/*">

            <br><br>

            <h2 id="profileName"></h2>

            <p><strong>Email :</strong> <span id="profileEmail"></span></p>

            <p><strong>Branch :</strong> <span id="profileBranch"></span></p>

            <p><strong>Passout Year :</strong> <span id="profileYear"></span></p>

            <button id="editBtn">Edit Profile</button>


            <div id="editForm" style="display:none; margin-top:20px;">

                <input type="text" id="editName" placeholder="Full Name">

                <br><br>

                <input type="text" id="editBranch" placeholder="Branch">

                <br><br>

                <input type="number" id="editYear" placeholder="Passout Year">

                <br><br>

                <button id="saveBtn">Save Changes</button>

            </div>
        </div>

    </section>

    <script src="profile.js"></script>
    <script src="navbar.js"></script>
